spring:
  datasource:
    url: jdbc:h2:mem:enter_project_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect

security:
  jwt:
    secret: enter-project-test-secret-key-for-context-load
    access-token-expiration-seconds: 3600
